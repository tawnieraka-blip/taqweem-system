<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>لوحة التحكم</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head> 

<body>

<div class="dashboard">

    <!-- Header -->

    <header class="topbar">

        <div class="logoBox">

            <img src="assets/logo.PNG">

            <div>

                <h2>منصة إدارة التقويم والمتابعة</h2>

                <small>
جمعية الدعوة والإرشاد وتوعية الجاليات بالراكة
                </small>

            </div>

        </div>

        <div class="userBox">

            <span id="userName"></span>

            <button id="logoutBtn">

                <i class="fa-solid fa-right-from-bracket"></i>

                خروج

            </button>

        </div>

    </header>


    <!-- Statistics -->

    <section class="cards">

        <div class="card">

            <i class="fa-solid fa-file-lines"></i>

            <h1 id="reportsCount">0</h1>

            <p>التقارير</p>

        </div>

        <div class="card">

            <i class="fa-solid fa-users"></i>

            <h1 id="employeesCount">0</h1>

            <p>الموظفون</p>

        </div>

        <div class="card">

            <i class="fa-solid fa-clock"></i>

            <h1 id="pendingCount">0</h1>

            <p>المعلقة</p>

        </div>

        <div class="card">

            <i class="fa-solid fa-calendar-day"></i>

            <h1 id="todayCount">0</h1>

            <p>اليوم</p>

        </div>

    </section>



    <!-- Menu -->

    <section class="menuGrid">

        <a href="upload.html" class="menuCard">

            <i class="fa-solid fa-upload"></i>

            <span>رفع تقرير</span>

        </a>

        <a href="reports.html" class="menuCard">

            <i class="fa-solid fa-file-lines"></i>

            <span>التقارير</span>

        </a>

        <a href="employees.html" class="menuCard">

            <i class="fa-solid fa-users"></i>

            <span>الموظفون</span>

        </a>

        <a href="settings.html" class="menuCard">

            <i class="fa-solid fa-gear"></i>

            <span>الإعدادات</span>

        </a>

    </section>



    <!-- Latest -->

    <section class="latest">

        <h3>

            <i class="fa-solid fa-clock-rotate-left"></i>

            آخر التقارير

        </h3>

        <div id="latestReports">

            جار التحميل...

        </div>

    </section>

</div>

<script src="js/config.js"></script>

<script src="js/api.js"></script>

<script src="js/dashboard.js"></script>

</body>

</html>
