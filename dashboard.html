<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>لوحة التحكم</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="dashboard">

<header class="topbar">

<div class="logo">

<img src="assets/logo.PNG">

<div>

<h2>منصة إدارة التقويم والمتابعة</h2>

<p>جمعية الدعوة والإرشاد وتوعية الجاليات بالراكة</p>

</div>

</div>

<div class="user">

<span id="userName"></span>

<button id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</header>

<section class="cards">

<div class="card">

<i class="fa-solid fa-file-lines"></i>

<h3 id="reportsCount">0</h3>

<p>التقارير</p>

</div>

<div class="card">

<i class="fa-solid fa-users"></i>

<h3 id="employeesCount">0</h3>

<p>الموظفون</p>

</div>

<div class="card">

<i class="fa-solid fa-clock"></i>

<h3 id="pendingCount">0</h3>

<p>المعلقة</p>

</div>

<div class="card">

<i class="fa-solid fa-chart-line"></i>

<h3 id="todayCount">0</h3>

<p>اليوم</p>

</div>

</section>

<section class="quick">

<a href="upload.html" class="action">

<i class="fa-solid fa-upload"></i>

<span>رفع تقرير</span>

</a>

<a href="reports.html" class="action">

<i class="fa-solid fa-file-lines"></i>

<span>التقارير</span>

</a>

<a href="employees.html" class="action">

<i class="fa-solid fa-users"></i>

<span>الموظفون</span>

</a>

<a href="settings.html" class="action">

<i class="fa-solid fa-gear"></i>

<span>الإعدادات</span>

</a>

</section>

<section class="latest">

<h3>

آخر التقارير

</h3>

<div id="latestReports">

لا توجد بيانات

</div>

</section>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>

</body>

</html>
