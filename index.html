<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>منصة إدارة التقويم والمتابعة</title>

    <!-- Bootstrap RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-page">

    <!-- أعلى الصفحة -->

    <div class="top-actions">

        <button class="icon-btn" id="installBtn">

            <i class="fa-solid fa-download"></i>

        </button>

        <button class="icon-btn" id="themeBtn">

            <i class="fa-solid fa-moon"></i>

        </button>

    </div>


    <!-- بطاقة تسجيل الدخول -->

    <div class="login-card">

        <img src="assets/logo.png" class="logo" alt="logo">

        <h6 class="association">

            جمعية الدعوة والإرشاد
            <br>
            وتوعية الجاليات بالراكة

        </h6>

        <h2 class="title">

            منصة إدارة التقويم والمتابعة

        </h2>

        <p class="subtitle">

            نظام متابعة الخطط والتقارير الأسبوعية

        </p>

        <div class="mb-4">

            <label class="form-label">

                <i class="fa-solid fa-key"></i>

                كود الدخول

            </label>

            <input
                type="text"
                class="form-control"
                placeholder="أدخل كود الدخول">

        </div>

        <button class="btn login-btn">

            <i class="fa-solid fa-right-to-bracket"></i>

            دخول

        </button>

        <div class="version">

            الإصدار 1.0.0

        </div>

    </div>

</div>

</body>

</html>
